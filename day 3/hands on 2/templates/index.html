<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment-Based Response Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h1 class="mb-0"><i class="fas fa-brain"></i> Sentiment Response Generator</h1>
                        <p class="mb-0">Powered by LangGraph & Hugging Face</p>
                    </div>
                    <div class="card-body">
                        <form id="sentimentForm" method="POST">
                            <div class="mb-3">
                                <label for="textInput" class="form-label">
                                    <i class="fas fa-comment-dots"></i> Enter your message:
                                </label>
                                <textarea class="form-control" id="textInput" name="text" rows="4" placeholder="Type something positive, negative, or neutral..." required></textarea>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                                    <i class="fas fa-paper-plane"></i> Analyze & Respond
                                </button>
                            </div>
                        </form>
                        {% if response %}
                        <div class="mt-4">
                            <h5 class="text-center text-muted"><i class="fas fa-reply"></i> Response:</h5>
                            <div class="alert alert-info" id="responseBox">
                                <p class="mb-0">{{ response }}</p>
                            </div>
                        </div>
                        {% endif %}
                    </div>
                    <div class="card-footer text-center text-muted">
                        <small>Uses sentiment analysis to route responses dynamically</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
