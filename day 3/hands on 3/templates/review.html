<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Flagged Content</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .item { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .content { font-style: italic; margin-bottom: 10px; }
        button { margin-right: 10px; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .approve { background: #28a745; color: white; }
        .reject { background: #dc3545; color: white; }
        .back { background: #007bff; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flagged Content for Review</h1>
        <div id="items"></div>
        <button class="back" onclick="window.location.href='/'">Back to Submit</button>
    </div>

    <script>
        async function loadItems() {
            console.log('Loading items...');
            try {
                const response = await fetch('/flagged');
                console.log('Response:', response);
                const items = await response.json();
                console.log('Items:', items);
                const container = document.getElementById('items');
                container.innerHTML = '';
                if (items.length === 0) {
                    container.innerHTML = '<p>No flagged content to review.</p>';
                } else {
                    items.forEach(item => {
                        console.log('Adding item:', item);
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `
                            <div class="content">${item.content}</div>
                            <button class="approve" onclick="decide('${item.id}', 'approve')">Approve</button>
                            <button class="reject" onclick="decide('${item.id}', 'reject')">Reject</button>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error('Error loading items:', error);
                document.getElementById('items').innerHTML = '<p>Error loading flagged content.</p>';
            }
        }

        async function decide(id, decision) {
            console.log('Deciding:', id, decision);
            const confirmMsg = decision === 'approve' ? 'Are you sure you want to APPROVE this content?' : 'Are you sure you want to REJECT this content?';
            if (!confirm(confirmMsg)) return;
            try {
                const response = await fetch(`/decide/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ decision })
                });
                const data = await response.json();
                console.log('Decision response:', data);
                alert(`Decision: ${data.status}`);
                loadItems();
            } catch (error) {
                console.error('Error deciding:', error);
                alert('Error making decision.');
            }
        }

        loadItems();
    </script>
</body>
</html>
