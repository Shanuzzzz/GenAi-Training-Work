<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Moderation System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .approved { background: #d4edda; color: #155724; }
        .flagged { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submit Content for Moderation</h1>
        <form id="submitForm">
            <textarea id="content" name="content" placeholder="Enter your content here..." required></textarea><br><br>
            <button type="submit">Submit</button>
        </form>
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('submitForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const content = document.getElementById('content').value;
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const data = await response.json();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            if (data.status === 'approved') {
                resultDiv.className = 'result approved';
                resultDiv.textContent = 'Content approved automatically.';
            } else if (data.status === 'flagged') {
                resultDiv.className = 'result flagged';
                resultDiv.textContent = `Content flagged for review. ID: ${data.id}`;
            } else {
                resultDiv.className = 'result';
                resultDiv.textContent = 'Error: ' + data.error;
            }
        });
    </script>
</body>
</html>
