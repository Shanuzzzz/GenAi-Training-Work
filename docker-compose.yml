version: '3.8'

services:
  backend:
    build: ./backend
    container_name: govscheme_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=gov_schemes_ai
      - SECRET_KEY=production_secret_key_change_me
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: govscheme_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Uncomment if you want to run frontend via docker instead of Vercel
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000
  #   depends_on:
  #     - backend

volumes:
  redis_data:
